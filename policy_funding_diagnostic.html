<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책자금 1차 진단 | 사장님 생존연구소</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --green: #C0392B;
    --green-light: #FDECEA;
    --green-dark: #922B21;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #C0392B;
    --red-light: #FDECEA;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --border: #e5e3df;
    --text: #1a1a18;
    --text-sub: #6b6966;
    --bg: #fafaf8;
    --white: #ffffff;
    --radius: 10px;
    --radius-lg: 14px;
    --kakao: #FEE500;
    --kakao-text: #191919;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .page-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-wrap { display: flex; flex-direction: column; gap: 1px; }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .logo-text span { color: var(--green); }
  .logo-sub { font-size: 11.5px; color: var(--text-sub); letter-spacing: 0.01em; }
  .logo-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 6px;
    padding: 3px 8px;
    letter-spacing: 0.04em;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .page-intro {
    background: var(--green-light);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    border-left: 4px solid var(--green);
  }
  .page-intro p { font-size: 13.5px; color: var(--green-dark); line-height: 1.7; }
  .page-intro strong { font-weight: 700; }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  @media (max-width: 520px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-sub); }
  .field input, .field select, .field textarea {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
  }
  .field textarea { resize: vertical; min-height: 72px; }

  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 5px;
  }
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.15s;
    user-select: none;
  }
  .checkbox-group label:hover { border-color: var(--green); }
  .checkbox-group input[type=checkbox] { display: none; }
  .checkbox-group label.checked {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
    font-weight: 500;
  }

  .mt { margin-top: 12px; }

  .btn-analyze {
    width: 100%;
    padding: 15px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    background: var(--green);
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    margin-top: 1.25rem;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-analyze:hover { background: var(--green-dark); }
  .btn-analyze:active { transform: scale(0.99); }
  .btn-analyze:disabled { background: var(--gray); cursor: not-allowed; transform: none; }

  .loading-wrap {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-sub);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-section { margin-top: 2rem; }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .stat-card.green .stat-num { color: var(--green); }
  .stat-card.blue .stat-num { color: var(--blue); }
  .stat-card.gray .stat-num { color: var(--gray); }

  .result-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 1.5rem 0 0.75rem;
  }

  .fund-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.125rem 1.25rem;
    margin-bottom: 0.75rem;
    border-left: 4px solid var(--border);
    transition: box-shadow 0.15s;
  }
  .fund-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .fund-card.p1 { border-left-color: var(--green); }
  .fund-card.p2 { border-left-color: var(--blue); }
  .fund-card.p3 { border-left-color: var(--amber); }
  .fund-card.ineligible { opacity: 0.5; border-left-color: var(--border); }

  .fund-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .fund-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .fund-org { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .fund-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .fund-limit { font-size: 16px; font-weight: 700; color: var(--green); }
  .fund-card.ineligible .fund-limit { color: var(--gray); }

  .badge-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bp-green { background: var(--green-light); color: var(--green-dark); }
  .bp-blue { background: var(--blue-light); color: #185FA5; }
  .bp-amber { background: var(--amber-light); color: var(--amber); }
  .bp-gray { background: var(--gray-light); color: var(--gray); }

  .cond-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .cond-badge {
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cond-ok { background: var(--green-light); color: var(--green-dark); }
  .cond-warn { background: var(--amber-light); color: var(--amber); }
  .cond-fail { background: var(--red-light); color: var(--red); }

  .fund-memo {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  /* 카카오 CTA */
  .kakao-cta {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-top: 1.5rem;
    text-align: center;
  }
  .kakao-cta p {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 1rem;
    line-height: 1.7;
  }
  .btn-kakao {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--kakao);
    color: var(--kakao-text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 13px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-kakao:hover { opacity: 0.9; }
  .btn-kakao:active { transform: scale(0.98); }
  .kakao-icon {
    width: 20px; height: 20px;
    background: var(--kakao-text);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--kakao);
  }

  /* 항상 보이는 하단 플로팅 CTA */
  .float-cta {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    z-index: 100;
  }
  .float-cta a {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--kakao);
    color: var(--kakao-text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 11px 18px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    transition: opacity 0.15s, transform 0.1s;
  }
  .float-cta a:hover { opacity: 0.92; transform: translateY(-1px); }

  .disclaimer {
    font-size: 11.5px;
    color: var(--text-sub);
    text-align: center;
    margin-top: 2rem;
    line-height: 1.7;
    padding: 0 0.5rem;
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="logo-wrap">
    <div class="logo-text">사장님 <span>생존</span>연구소</div>
    <div class="logo-sub">소생컴퍼니 · 정책자금 전문 컨설팅</div>

</header>

<div class="container">

  <div class="page-intro">
    <p><strong>내부 상담용 1차 진단 도구입니다.</strong><br>
    고객 정보 입력 후 AI 진단을 실행하면 수혜 가능한 정책자금과 우선순위를 자동으로 분석합니다.<br>
    결과는 참고용이며, 최종 판단은 전문가 검토 후 확정하세요.</p>
  </div>

    <div class="card-title"><span class="card-title-dot"></span>기본 정보</div>
    <div class="grid2">
      <div class="field"><label>사업자명</label><input id="bizName" placeholder="예) 홍길동 전기설비"></div>

    </div>
    <div class="grid3 mt">
      <div class="field"><label>생년월일</label><input id="birthDate" placeholder="예) 850312"></div>
      <div class="field"><label>신용점수 (NICE/KCB)</label><input id="creditScore" placeholder="예) 720 / 680"></div>
      <div class="field"><label>사업형태</label>
        <select id="bizType">
          <option value="">선택</option>

  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>사업 현황</div>
    <div class="grid2">
      <div class="field"><label>업종 / 종목</label><input id="bizSector" placeholder="예) 전기공사업, 카페, 제조업"></div>
      <div class="field"><label>사업개시일</label><input id="bizStart" placeholder="예) 2020년 3월"></div>
    </div>
    <div class="grid3 mt">
      <div class="field"><label>상시근로자 수</label><input id="employees" placeholder="예) 3명"></div>
      <div class="field"><label>연 매출</label><input id="revenue" placeholder="예) 1억 2천만원"></div>
      <div class="field"><label>사업장 소재지</label><input id="location" placeholder="예) 서울 강남구"></div>

  <!-- 재무/신용 현황 -->

      <div class="checkbox-group" id="policyHistoryGroup">
        <label onclick="toggleCheck(this)"><input type="checkbox" value="지역신용보증재단"> 지역신용보증재단</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="소상공인진흥공단"> 소상공인진흥공단</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="신용보증기금"> 신용보증기금</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="기술보증기금"> 기술보증기금</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="중진공"> 중진공</label>

          <option value="개인워크아웃">개인워크아웃</option>

<script>
function toggleCheck(label) {
  label.classList.toggle('checked');
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
}

/* ── 업력 계산 (년 단위) ── */
function calcAge(bizStart) {
  if (!bizStart) return null;
  const m = bizStart.match(/(\d{4})[년\-\/\s]*(\d{1,2})?/);
  if (!m) return null;
  const y = parseInt(m[1]);
  const mo = m[2] ? parseInt(m[2]) - 1 : 0;
  const start = new Date(y, mo, 1);
  const now = new Date();
  return (now - start) / (1000 * 60 * 60 * 24 * 365.25);
}

/* ── 매출 숫자 변환 (만원 단위) ── */
function parseRevenue(str) {
  if (!str) return null;
  const s = str.replace(/,/g, '').replace(/\s/g, '');
  let val = 0;
  const mEok = s.match(/(\d+\.?\d*)\s*억/);
  const mChun = s.match(/(\d+\.?\d*)\s*천/);
  const mMan = s.match(/(\d+\.?\d*)\s*만/);
  if (mEok) val += parseFloat(mEok[1]) * 10000;
  if (mChun) val += parseFloat(mChun[1]) * 1000;
  if (mMan) val += parseFloat(mMan[1]);
  if (val === 0) {
    const num = parseFloat(s.replace(/[^0-9.]/g, ''));
    if (!isNaN(num)) val = num;
  }
  return val || null;
}

/* ── 근로자 수 파싱 ── */
function parseWorkers(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(/[^0-9]/g, ''));
  return isNaN(n) ? null : n;
}

/* ── 신용점수 파싱 (NICE 기준) ── */
function parseCreditScore(str) {
  if (!str) return null;
  const nums = str.match(/\d{3}/g);
  if (!nums) return null;
  return Math.max(...nums.map(Number));
}

/* ── 정책자금 이력 체크 ── */
function hasHistory(history, keyword) {
  if (!history || history === '없음') return false;
  return history.includes(keyword);
}

/* ── 업종 분류 ── */
function isTechSector(sector) {
  if (!sector) return false;
  const keywords = ['제조', 'IT', '기술', '소프트웨어', '개발', 'R&D', '연구', '바이오', '전기', '전자', '기계', '화학', '소재'];
  return keywords.some(k => sector.includes(k));
}

function isSmallBizSector(sector) {
  if (!sector) return false;
  const excluded = ['유흥', '도박', '사행', '금융업', '보험업'];
  return !excluded.some(k => sector.includes(k));
}

/* ── 메인 진단 함수 ── */
function diagnose(d) {
  const taxOk    = d.taxDelinquent === '없음';
  const creditOk = d.creditHistory === '없음';
  const bizAge   = calcAge(d.bizStart);
  const ageOk1   = bizAge !== null && bizAge >= 1;
  const ageOk3   = bizAge !== null && bizAge >= 3;
  const ageUnder5 = bizAge !== null && bizAge < 5;
  const workers  = parseWorkers(d.employees);
  const revenue  = parseRevenue(d.revenue);
  const credit   = parseCreditScore(d.creditScore);
  const creditGood = credit !== null && credit >= 650;
  const hasSojin  = hasHistory(d.policyHistory, '소상공인진흥공단');

  {

  /* 정렬: eligible 먼저, priority 오름차순 */
  funds.sort((a, b) => {
    if (a.eligible === b.eligible) return (a.priority || 99) - (b.priority || 99);
    return a.eligible ? -1 : 1;
  });

  return funds;
}

/* ── 결과 렌더링 ── */
function renderResults(funds) {
  const eligible   = funds.filter(f => f.eligible);
  const ineligible = funds.filter(f => !f.eligible);
  const top1       = eligible.filter(f => f.priority === 1).length;

  const priorityLabel = {1:'최우선 추천', 2:'추천', 3:'가능'};
  const priorityClass = {1:'bp-green', 2:'bp-blue', 3:'bp-amber'};
  const cardClass     = {1:'p1', 2:'p2', 3:'p3'};
  const condIcon      = {ok:'✓', warn:'△', fail:'✗'};

  function fundCard(f, inel) {
    const cc = inel ? 'ineligible' : (cardClass[f.priority] || 'p3');
    const pc = inel ? 'bp-gray' : (priorityClass[f.priority] || 'bp-amber');
    const pl = inel ? '수혜 불가' : (priorityLabel[f.priority] || '가능');
    return `
      <div class="fund-card ${cc}">
        <div class="fund-header">
          <div>
            <div class="fund-name">${f.name}</div>
            <div class="fund-org">${f.org}</div>
          </div>
          <div class="fund-right">
            <div class="fund-limit">${inel ? '—' : f.limit}</div>
            <span class="badge-pill ${pc}">${pl}</span>
          </div>
        </div>
        ${f.conditions && f.conditions.length ? `
          <div class="cond-row">
            ${f.conditions.map(c=>`<span class="cond-badge cond-${c.status}">${condIcon[c.status]} ${c.label}</span>`).join('')}
          </div>` : ''}
        ${f.memo ? `<div class="fund-memo">${f.memo}</div>` : ''}
      </div>`;
  }

  let html = `
    <div class="result-section">
      <div class="summary-grid">
        <div class="stat-card green"><div class="stat-num">${eligible.length}</div><div class="stat-label">수혜 가능 자금</div></div>
        <div class="stat-card blue"><div class="stat-num">${top1}</div><div class="stat-label">최우선 추천</div></div>
        <div class="stat-card gray"><div class="stat-num">${ineligible.length}</div><div class="stat-label">조건 미충족</div></div>
      </div>
      <div class="result-label">수혜 가능 자금 (우선순위 순)</div>
      ${eligible.map(f => fundCard(f, false)).join('')}
  `;
  if (ineligible.length) {
    html += `<div class="result-label" style="margin-top:1.5rem;">조건 미충족 자금</div>`;
    html += ineligible.map(f => fundCard(f, true)).join('');
  }
  html += `
      <div class="kakao-cta">
        <p>진단 결과를 바탕으로 전문가와 상담하시면<br>실제 신청 가능 여부와 준비 서류를 안내해드립니다.</p>
        <a class="btn-kakao" href="http://pf.kakao.com/_BwKMX/chat" target="_blank">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <ellipse cx="10" cy="9" rx="8.5" ry="7" fill="#191919"/>
            <path d="M5.5 12.5 L6.8 9.2 L10 13.5 L13.2 9.2 L14.5 12.5" stroke="#FEE500" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          </svg>
          카카오 채널로 전문가 상담 신청하기
        </a>
      </div>
    </div>`;
  return html;
}

  const resultWrap = document.getElementById('resultWrap');

  const checks = document.querySelectorAll('#policyHistoryGroup input[type=checkbox]:checked');
  const policyHistory = Array.from(checks).map(c => c.value).join(', ') || '없음';

  const d = {
    bizName:       document.getElementById('bizName').value,
    ceoName:       document.getElementById('ceoName').value,
    birthDate:     document.getElementById('birthDate').value,
    creditScore:   document.getElementById('creditScore').value,
    bizType:       document.getElementById('bizType').value,
    sector:        document.getElementById('bizSector').value,
    bizStart:      document.getElementById('bizStart').value,
    employees:     document.getElementById('employees').value,
    revenue:       document.getElementById('revenue').value,
    policyHistory,
    existingLoans: document.getElementById('existingLoans').value,
    fundNeeded:    document.getElementById('fundNeeded').value,
    taxDelinquent: document.getElementById('taxDelinquent').value,
    creditHistory: document.getElementById('creditHistory').value,
    location:      document.getElementById('location').value,
    residence:     document.getElementById('residence').value,
    notes:         document.getElementById('notes').value,
  };

  btn.disabled = true;
  btn.textContent = '분석 중...';
  resultWrap.innerHTML = `<div class="loading-wrap"><div class="spinner"></div>정책자금 조건을 분석하고 있습니다...</div>`;

  setTimeout(() => {
    try {
      const funds = diagnose(d);
      resultWrap.innerHTML = renderResults(funds);
    } catch(e) {
      resultWrap.innerHTML = `<div class="loading-wrap">분석 중 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.</div>`;
    }
    btn.disabled = false;
    btn.textContent = '다시 진단하기';
    resultWrap.scrollIntoView({behavior:'smooth', block:'start'});
  }, 600);
}
</script>

</body>
</html>
