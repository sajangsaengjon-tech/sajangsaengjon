<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책자금 1차 진단 | 사장님 생존연구소</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --green: #C0392B;
    --green-light: #FDECEA;
    --green-dark: #922B21;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #C0392B;
    --red-light: #FDECEA;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --border: #e5e3df;
    --text: #1a1a18;
    --text-sub: #6b6966;
    --bg: #fafaf8;
    --white: #ffffff;
    --radius: 10px;
    --radius-lg: 14px;
    --kakao: #FEE500;
    --kakao-text: #191919;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .page-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-wrap { display: flex; flex-direction: column; gap: 1px; }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .logo-text span { color: var(--green); }
  .logo-sub { font-size: 11.5px; color: var(--text-sub); letter-spacing: 0.01em; }
  .logo-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 6px;
    padding: 3px 8px;
    letter-spacing: 0.04em;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .page-intro {
    background: var(--green-light);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    border-left: 4px solid var(--green);
  }
  .page-intro p { font-size: 13.5px; color: var(--green-dark); line-height: 1.7; }
  .page-intro strong { font-weight: 700; }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  @media (max-width: 520px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-sub); }
  .field input, .field select, .field textarea {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
  }
  .field textarea { resize: vertical; min-height: 72px; }

  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 5px;
  }
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.15s;
    user-select: none;
  }
  .checkbox-group label:hover { border-color: var(--green); }
  .checkbox-group input[type=checkbox] { display: none; }
  .checkbox-group label.checked {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
    font-weight: 500;
  }

  .mt { margin-top: 12px; }

  .btn-analyze {
    width: 100%;
    padding: 15px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    background: var(--green);
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    margin-top: 1.25rem;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-analyze:hover { background: var(--green-dark); }
  .btn-analyze:active { transform: scale(0.99); }
  .btn-analyze:disabled { background: var(--gray); cursor: not-allowed; transform: none; }

  .loading-wrap {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-sub);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-section { margin-top: 2rem; }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .stat-card.green .stat-num { color: var(--green); }
  .stat-card.blue .stat-num { color: var(--blue); }
  .stat-card.gray .stat-num { color: var(--gray); }

  .result-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 1.5rem 0 0.75rem;
  }

  .fund-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.125rem 1.25rem;
    margin-bottom: 0.75rem;
    border-left: 4px solid var(--border);
    transition: box-shadow 0.15s;
  }
  .fund-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .fund-card.p1 { border-left-color: var(--green); }
  .fund-card.p2 { border-left-color: var(--blue); }
  .fund-card.p3 { border-left-color: var(--amber); }
  .fund-card.ineligible { opacity: 0.5; border-left-color: var(--border); }

  .fund-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .fund-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .fund-org { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .fund-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .fund-limit { font-size: 16px; font-weight: 700; color: var(--green); }
  .fund-card.ineligible .fund-limit { color: var(--gray); }

  .badge-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bp-green { background: var(--green-light); color: var(--green-dark); }
  .bp-blue { background: var(--blue-light); color: #185FA5; }
  .bp-amber { background: var(--amber-light); color: var(--amber); }
  .bp-gray { background: var(--gray-light); color: var(--gray); }

  .cond-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .cond-badge {
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cond-ok { background: var(--green-light); color: var(--green-dark); }
  .cond-warn { background: var(--amber-light); color: var(--amber); }
  .cond-fail { background: var(--red-light); color: var(--red); }

  .fund-memo {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  /* 카카오 CTA */
  .kakao-cta {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-top: 1.5rem;
    text-align: center;
  }
  .kakao-cta p {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 1rem;
    line-height: 1.7;
  }
  .btn-kakao {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--kakao);
    color: var(--kakao-text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 13px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-kakao:hover { opacity: 0.9; }
  .btn-kakao:active { transform: scale(0.98); }
  .kakao-icon {
    width: 20px; height: 20px;
    background: var(--kakao-text);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--kakao);
  }

  /* 항상 보이는 하단 플로팅 CTA */
  .float-cta {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    z-index: 100;
  }
  .float-cta a {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--kakao);
    color: var(--kakao-text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 11px 18px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    transition: opacity 0.15s, transform 0.1s;
  }
  .float-cta a:hover { opacity: 0.92; transform: translateY(-1px); }

  .disclaimer {
    font-size: 11.5px;
    color: var(--text-sub);
    text-align: center;
    margin-top: 2rem;
    line-height: 1.7;
    padding: 0 0.5rem;
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="logo-wrap">
    <div class="logo-text">사장님 <span>생존</span>연구소</div>
    <div class="logo-sub">소생컴퍼니 · 정책자금 전문 컨설팅</div>
  </div>
  <div class="logo-badge">내부 진단용</div>
</header>

<div class="container">

  <div class="page-intro">
    <p><strong>내부 상담용 1차 진단 도구입니다.</strong><br>
    고객 정보 입력 후 AI 진단을 실행하면 수혜 가능한 정책자금과 우선순위를 자동으로 분석합니다.<br>
    결과는 참고용이며, 최종 판단은 전문가 검토 후 확정하세요.</p>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>기본 정보</div>
    <div class="grid2">
      <div class="field"><label>사업자명</label><input id="bizName" placeholder="예) 홍길동 전기설비"></div>
      <div class="field"><label>대표자명</label><input id="ceoName" placeholder="예) 홍길동"></div>
    </div>
    <div class="grid3 mt">
      <div class="field"><label>생년월일</label><input id="birthDate" placeholder="예) 850312"></div>
      <div class="field"><label>신용점수 (NICE/KCB)</label><input id="creditScore" placeholder="예) 720 / 680"></div>
      <div class="field"><label>사업형태</label>
        <select id="bizType">
          <option value="">선택</option>
          <option>개인사업자</option>
          <option>법인사업자</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 사업 현황 -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>사업 현황</div>
    <div class="grid2">
      <div class="field"><label>업종 / 종목</label><input id="bizSector" placeholder="예) 전기공사업, 카페, 제조업"></div>
      <div class="field"><label>사업개시일</label><input id="bizStart" placeholder="예) 2020년 3월"></div>
    </div>
    <div class="grid3 mt">
      <div class="field"><label>상시근로자 수</label><input id="employees" placeholder="예) 3명"></div>
      <div class="field"><label>연 매출</label><input id="revenue" placeholder="예) 1억 2천만원"></div>
      <div class="field"><label>사업장 소재지</label><input id="location" placeholder="예) 서울 강남구"></div>
    </div>
  </div>

  <!-- 재무/신용 현황 -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>재무 · 신용 현황</div>
    <div class="field">
      <label>정책자금 대출이력 (복수 선택 가능)</label>
      <div class="checkbox-group" id="policyHistoryGroup">
        <label onclick="toggleCheck(this)"><input type="checkbox" value="지역신용보증재단"> 지역신용보증재단</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="소상공인진흥공단"> 소상공인진흥공단</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="신용보증기금"> 신용보증기금</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="기술보증기금"> 기술보증기금</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="중진공"> 중진공</label>
        <label onclick="toggleCheck(this)"><input type="checkbox" value="없음"> 없음</label>
      </div>
    </div>
    <div class="grid2 mt">
      <div class="field"><label>현재 보유 대출</label><input id="existingLoans" placeholder="예) 국민은행 2500만원 15%"></div>
      <div class="field"><label>필요 자금 규모</label><input id="fundNeeded" placeholder="예) 5000만원"></div>
    </div>
    <div class="grid3 mt">
      <div class="field"><label>세금 체납 여부</label>
        <select id="taxDelinquent">
          <option value="없음">없음</option>
          <option value="있음">있음</option>
        </select>
      </div>
      <div class="field"><label>신용 관련 이력</label>
        <select id="creditHistory">
          <option value="없음">없음</option>
          <option value="개인회생">개인회생</option>
          <option value="개인워크아웃">개인워크아웃</option>
          <option value="면책">면책</option>
          <option value="신용회복">신용회복</option>
        </select>
      </div>
      <div class="field"><label>거주지</label><input id="residence" placeholder="예) 경기 수원시"></div>
    </div>
  </div>

  <!-- 특이사항 -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>특이사항</div>
    <div class="field">
      <textarea id="notes" placeholder="예) 최근 사업장 이전, 시설 투자 계획, 업종 전환 예정, 담보 보유 여부 등"></textarea>
    </div>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">AI 정책자금 진단 시작</button>

  <div id="resultWrap"></div>

  <p class="disclaimer">
    본 진단 결과는 AI 기반 1차 분석으로, 실제 수혜 여부는 각 기관의 심사 기준에 따라 달라질 수 있습니다.<br>
    정확한 상담은 사장님 생존연구소 전문가에게 문의하세요.
  </p>

</div>

<!-- 플로팅 카카오 버튼 -->
<div class="float-cta">
  <a href="http://pf.kakao.com/_BwKMX/chat" target="_blank">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <ellipse cx="10" cy="9" rx="8.5" ry="7" fill="#191919"/>
      <path d="M5.5 12.5 L6.8 9.2 L10 13.5 L13.2 9.2 L14.5 12.5" stroke="#FEE500" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    </svg>
    카카오로 상담 신청
  </a>
</div>

<script>
function toggleCheck(label) {
  label.classList.toggle('checked');
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
}

async function runAnalysis() {
  const btn = document.getElementById('analyzeBtn');
  const resultWrap = document.getElementById('resultWrap');

  const checks = document.querySelectorAll('#policyHistoryGroup input[type=checkbox]:checked');
  const policyHistory = Array.from(checks).map(c => c.value).join(', ') || '없음';

  const formData = {
    사업자명: document.getElementById('bizName').value,
    대표자명: document.getElementById('ceoName').value,
    생년월일: document.getElementById('birthDate').value,
    신용점수: document.getElementById('creditScore').value,
    사업형태: document.getElementById('bizType').value,
    업종: document.getElementById('bizSector').value,
    사업개시일: document.getElementById('bizStart').value,
    상시근로자: document.getElementById('employees').value,
    연매출: document.getElementById('revenue').value,
    정책자금이력: policyHistory,
    보유대출: document.getElementById('existingLoans').value,
    필요자금: document.getElementById('fundNeeded').value,
    세금체납: document.getElementById('taxDelinquent').value,
    신용이력: document.getElementById('creditHistory').value,
    사업장소재지: document.getElementById('location').value,
    거주지: document.getElementById('residence').value,
    특이사항: document.getElementById('notes').value,
  };

  btn.disabled = true;
  btn.textContent = '분석 중...';
  resultWrap.innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      정책자금 조건을 분석하고 있습니다. 잠시만 기다려주세요.
    </div>`;

  const prompt = `
당신은 대한민국 정책자금 전문 컨설턴트입니다. 아래 소상공인/중소기업 고객 정보를 보고, 수혜 가능한 정책자금을 분석해주세요.

[고객 정보]
${Object.entries(formData).map(([k,v]) => `${k}: ${v || '미입력'}`).join('\n')}

[분석 대상 정책자금 목록]
1. 소상공인진흥공단 - 일반경영안정자금 (한도: 7천만원, 개인/법인 모두 가능, 업력 1년이상, 세금체납없음 필수)
2. 소상공인진흥공단 - 성장기반자금 (한도: 1억원, 업력 3년이상, 근로자 5인 미만)
3. 소상공인진흥공단 - 스마트소상공인자금 (한도: 1억원, 스마트기술·디지털 도입 의향 업체)
4. 지역신용보증재단 - 일반보증 (한도: 1억원, 지역 내 소재 사업체, 세금체납없음)
5. 지역신용보증재단 - 창업보증 (한도: 5천만원, 업력 5년 미만)
6. 신용보증기금 - 일반보증 (한도: 최대 30억, 연매출 10억이상 또는 성장성 있는 기업)
7. 기술보증기금 - 기술평가보증 (한도: 최대 30억, 기술력·R&D 기업, 제조업/IT 우선)
8. 중소벤처기업진흥공단 - 일반경영안정자금 (한도: 10억, 중소기업, 업력 1년이상, 세금체납없음)
9. 중소벤처기업진흥공단 - 신성장기반자금 (한도: 60억, 성장유망업종, 기술혁신형 기업)
10. 지자체 소상공인 특별융자 (한도: 3천만원, 해당 지자체 소재 필수, 업종 제한 있음)

다음 형식의 JSON 배열로만 응답하세요. 다른 텍스트 없이 JSON만 출력하세요:

[
  {
    "name": "자금명",
    "org": "기관명",
    "limit": "한도금액(예: 7천만원)",
    "priority": 1,
    "eligible": true,
    "conditions": [
      {"label": "조건 설명", "status": "ok"},
      {"label": "조건 설명", "status": "warn"},
      {"label": "조건 설명", "status": "fail"}
    ],
    "memo": "한 줄 코멘트 (신청 시 주의사항 또는 전략 포함)"
  }
]

규칙:
- priority는 1(최우선)~3(가능), eligible=false는 수혜 불가
- status는 ok(충족)/warn(요확인)/fail(미충족)
- eligible=false 항목은 배열 뒤쪽에 배치
- 한국어로 작성
`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const funds = JSON.parse(clean);

    const eligible = funds.filter(f => f.eligible !== false);
    const ineligible = funds.filter(f => f.eligible === false);
    const top1 = funds.filter(f => f.priority === 1 && f.eligible !== false).length;

    const priorityLabel = { 1: '최우선 추천', 2: '추천', 3: '가능' };
    const priorityClass = { 1: 'bp-green', 2: 'bp-blue', 3: 'bp-amber' };
    const cardClass = { 1: 'p1', 2: 'p2', 3: 'p3' };
    const condIcon = { ok: '✓', warn: '△', fail: '✗' };

    let html = `
      <div class="result-section">
        <div class="summary-grid">
          <div class="stat-card green">
            <div class="stat-num">${eligible.length}</div>
            <div class="stat-label">수혜 가능 자금</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-num">${top1}</div>
            <div class="stat-label">최우선 추천</div>
          </div>
          <div class="stat-card gray">
            <div class="stat-num">${ineligible.length}</div>
            <div class="stat-label">조건 미충족</div>
          </div>
        </div>

        <div class="result-label">수혜 가능 자금 (우선순위 순)</div>
    `;

    eligible.forEach(f => {
      const cc = cardClass[f.priority] || 'p3';
      const pc = priorityClass[f.priority] || 'bp-amber';
      html += `
        <div class="fund-card ${cc}">
          <div class="fund-header">
            <div>
              <div class="fund-name">${f.name}</div>
              <div class="fund-org">${f.org}</div>
            </div>
            <div class="fund-right">
              <div class="fund-limit">${f.limit}</div>
              <span class="badge-pill ${pc}">${priorityLabel[f.priority] || '가능'}</span>
            </div>
          </div>
          ${f.conditions && f.conditions.length ? `
            <div class="cond-row">
              ${f.conditions.map(c => `<span class="cond-badge cond-${c.status}">${condIcon[c.status]} ${c.label}</span>`).join('')}
            </div>` : ''}
          ${f.memo ? `<div class="fund-memo">${f.memo}</div>` : ''}
        </div>`;
    });

    if (ineligible.length > 0) {
      html += `<div class="result-label" style="margin-top:1.5rem;">조건 미충족 자금</div>`;
      ineligible.forEach(f => {
        html += `
          <div class="fund-card ineligible">
            <div class="fund-header">
              <div>
                <div class="fund-name">${f.name}</div>
                <div class="fund-org">${f.org}</div>
              </div>
              <div class="fund-right">
                <div class="fund-limit">—</div>
                <span class="badge-pill bp-gray">수혜 불가</span>
              </div>
            </div>
            ${f.conditions && f.conditions.length ? `
              <div class="cond-row">
                ${f.conditions.map(c => `<span class="cond-badge cond-${c.status}">${condIcon[c.status]} ${c.label}</span>`).join('')}
              </div>` : ''}
            ${f.memo ? `<div class="fund-memo">${f.memo}</div>` : ''}
          </div>`;
      });
    }

    html += `
        <div class="kakao-cta">
          <p>진단 결과를 바탕으로 전문가와 상담하시면<br>실제 신청 가능 여부와 준비 서류를 안내해드립니다.</p>
          <a class="btn-kakao" href="http://pf.kakao.com/_BwKMX/chat" target="_blank">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <ellipse cx="10" cy="9" rx="8.5" ry="7" fill="#191919"/>
              <path d="M5.5 12.5 L6.8 9.2 L10 13.5 L13.2 9.2 L14.5 12.5" stroke="#FEE500" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
            </svg>
            카카오 채널로 전문가 상담 신청하기
          </a>
        </div>
      </div>`;

    resultWrap.innerHTML = html;

  } catch(e) {
    resultWrap.innerHTML = `
      <div class="loading-wrap">
        분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.
      </div>`;
  }

  btn.disabled = false;
  btn.textContent = '다시 진단하기';
  resultWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
