<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책자금 사전진단 — 사장님 생존연구소</title>

<style>
:root {
  --red: #C0392B;
  --red-soft: #FDECEA;
  --red-mid: #d44235;
  --dark: #1A1A1A;
  --mid: #444;
  --gray: #888;
  --border: #E8E8E8;
  --bg: #F9F8F6;
  --white: #fff;
  --green: #1a7a4a;
  --green-soft: #d1f0e0;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 24px 0;
}

.wrap {
  width: 100%;
  max-width: 560px;
  margin-bottom: 0;
}

/* 헤더 */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--red-soft);
  color: var(--red);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 14px;
}
.header h1 {
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
  line-height: 1.3;
}
.header p {
  font-size: 13px;
  color: var(--gray);
}

/* 카드 */
.card {
  background: var(--white);
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 4px 32px rgba(0,0,0,.07);
}

/* 진행바 */
.progress-wrap {
  padding: 20px 28px 0;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label {
  font-size: 12px;
  color: var(--gray);
}
.progress-step {
  font-size: 12px;
  font-weight: 700;
  color: var(--red);
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--red);
  border-radius: 2px;
  transition: width .4s ease;
}

/* 질문 영역 */
.question-area {
  padding: 28px 28px 24px;
}

.q-num {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.q-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.4;
  margin-bottom: 6px;
}
.q-sub {
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 22px;
  line-height: 1.6;
}

/* 선택지 */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all .2s;
  background: var(--white);
}
.opt:hover {
  border-color: var(--red);
  background: var(--red-soft);
}
.opt.selected {
  border-color: var(--red);
  background: var(--red-soft);
}
.opt-icon {
  font-size: 22px;
  min-width: 28px;
  text-align: center;
}
.opt-body { flex: 1; }
.opt-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
  display: block;
}
.opt-desc {
  font-size: 12px;
  color: var(--gray);
  margin-top: 2px;
}
.opt-check {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: transparent;
  background: var(--white);
  flex-shrink: 0;
  transition: all .2s;
}
.opt.selected .opt-check {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

/* 버튼 영역 */
.btn-area {
  padding: 0 28px 28px;
  display: flex;
  gap: 10px;
}
.btn-next {
  flex: 1;
  background: var(--red);
  color: white;
  border: none;
  padding: 15px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  transition: all .2s;
  opacity: .4;
  pointer-events: none;
}
.btn-next.active {
  opacity: 1;
  pointer-events: all;
}
.btn-next.active:hover {
  background: var(--red-mid);
  transform: translateY(-1px);
}
.btn-back {
  background: var(--bg);
  color: var(--gray);
  border: 1.5px solid var(--border);
  padding: 15px 18px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  transition: all .2s;
  display: none;
}
.btn-back:hover { color: var(--dark); border-color: var(--mid); }

/* 결과 화면 */
.result-area {
  padding: 32px 28px 28px;
  display: none;
}
.result-top {
  text-align: center;
  margin-bottom: 24px;
}
.result-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.result-title {
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 6px;
}
.result-sub {
  font-size: 13px;
  color: var(--gray);
}

.result-funds {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.fund-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--bg);
}
.fund-card.primary {
  border-color: var(--red);
  background: var(--red-soft);
}
.fund-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.fund-badge.best { background: var(--red); color: white; }
.fund-badge.good { background: var(--dark); color: white; }
.fund-badge.check { background: var(--border); color: var(--gray); }
.fund-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 3px;
}
.fund-info span {
  font-size: 12px;
  color: var(--gray);
  line-height: 1.6;
}

.caution-box {
  background: #fff8e1;
  border: 1px solid #ffe082;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px;
  color: #7a5800;
  margin-bottom: 20px;
  line-height: 1.7;
}
.caution-box strong { display: block; margin-bottom: 4px; font-size: 13px; }

.cta-box {
  background: var(--dark);
  border-radius: 14px;
  padding: 22px 20px;
  text-align: center;
}
.cta-box p {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 14px;
  line-height: 1.7;
}
.cta-box strong {
  display: block;
  font-size: 15px;
  color: white;
  margin-bottom: 14px;
}
.btn-kakao {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #FEE500;
  color: #391B1B;
  padding: 13px 32px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  transition: opacity .2s;
  cursor: pointer;
  border: none;
}
.btn-kakao:hover { opacity: .85; }
.btn-reset {
  display: block;
  margin: 12px auto 0;
  background: none;
  border: none;
  font-size: 12px;
  color: #666;
  cursor: pointer;
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  text-decoration: underline;
}

/* 애니메이션 */
.fade-in {
  animation: fadeIn .35s ease both;
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-badge">🔍 무료 사전진단</div>
    <h1>내가 받을 수 있는<br>정책자금이 있을까요?</h1>
    <p>4가지 질문으로 약 1분 안에 확인하세요</p>
  </div>

  <div class="card">

    <!-- 진행바 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-info">
        <span class="progress-label">진단 진행 중</span>
        <span class="progress-step" id="stepText">1 / 4</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:25%"></div>
      </div>
    </div>

    <!-- 질문 영역 -->
    <div class="question-area" id="questionArea">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <div class="q-text" id="qText"></div>
      <div class="q-sub" id="qSub"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <!-- 버튼 -->
    <div class="btn-area" id="btnArea">
      <button class="btn-back" id="btnBack" onclick="goBack()">← 이전</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">다음으로 →</button>
    </div>

    <!-- 결과 -->
    <div class="result-area" id="resultArea"></div>

  </div>
</div>

<script>
const questions = [
  {
    q: "현재 사업자 등록이 되어 있나요?",
    sub: "개인사업자, 법인사업자 모두 해당돼요",
    options: [
      { icon:"✅", label:"예, 사업자 등록 완료", desc:"개인 또는 법인사업자", val:"yes" },
      { icon:"🔜", label:"준비 중 / 예비창업자", desc:"아직 사업자 없음", val:"pre" },
      { icon:"⏸️", label:"휴업 상태예요", desc:"현재 영업 중단", val:"pause" },
    ]
  },
  {
    q: "사업을 시작한 지 얼마나 됐나요?",
    sub: "사업자 등록일 기준이에요",
    options: [
      { icon:"🌱", label:"6개월 미만", desc:"초기 창업 단계", val:"under6" },
      { icon:"📅", label:"6개월 ~ 2년", desc:"초기 운영 중", val:"6to2" },
      { icon:"🏪", label:"2년 ~ 5년", desc:"안정기 진입", val:"2to5" },
      { icon:"🏆", label:"5년 이상", desc:"베테랑 사업자", val:"over5" },
    ]
  },
  {
    q: "현재 직원이 몇 명인가요?",
    sub: "대표자 본인은 제외하고 알려주세요",
    options: [
      { icon:"👤", label:"직원 없음 (1인 사업자)", desc:"혼자 운영 중", val:"solo" },
      { icon:"👥", label:"1 ~ 4명", desc:"소규모 운영", val:"1to4" },
      { icon:"🏢", label:"5명 이상", desc:"일정 규모 갖춤", val:"over5" },
    ]
  },
  {
    q: "자금이 필요한 이유가 뭔가요?",
    sub: "가장 가까운 상황을 선택해 주세요",
    options: [
      { icon:"💸", label:"임대료·인건비 등 운영 자금", desc:"당장 필요한 생활비 같은 자금", val:"operation" },
      { icon:"🔧", label:"인테리어·설비 등 시설 투자", desc:"가게 꾸미거나 장비 구입", val:"facility" },
      { icon:"📈", label:"사업 확장·신규 투자", desc:"매장 추가, 온라인 진출 등", val:"expand" },
      { icon:"🚀", label:"창업 준비 자금", desc:"처음 시작하는 비용", val:"startup" },
    ]
  }
];

let current = 0;
let answers = [];

function render() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `QUESTION 0${current+1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qSub').textContent = q.sub;
  document.getElementById('stepText').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((current+1)/questions.length)*100}%`;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (answers[current] === opt.val ? ' selected' : '');
    div.innerHTML = `
      <div class="opt-icon">${opt.icon}</div>
      <div class="opt-body">
        <span class="opt-label">${opt.label}</span>
        <span class="opt-desc">${opt.desc}</span>
      </div>
      <div class="opt-check">✓</div>
    `;
    div.onclick = () => selectOpt(opt.val);
    wrap.appendChild(div);
  });

  document.getElementById('questionArea').classList.add('fade-in');
  setTimeout(() => document.getElementById('questionArea').classList.remove('fade-in'), 400);

  const btnNext = document.getElementById('btnNext');
  const btnBack = document.getElementById('btnBack');
  btnNext.textContent = current === questions.length-1 ? '진단 결과 보기 →' : '다음으로 →';
  btnNext.className = 'btn-next' + (answers[current] ? ' active' : '');
  btnBack.style.display = current > 0 ? 'block' : 'none';
}

function selectOpt(val) {
  answers[current] = val;
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.opt').forEach(o => {
    const q = questions[current];
    const opt = q.options.find(op => op.val === val);
    if (o.querySelector('.opt-label').textContent === opt.label) o.classList.add('selected');
  });
  document.getElementById('btnNext').className = 'btn-next active';
}

function goNext() {
  if (!answers[current]) return;
  if (current < questions.length - 1) {
    current++;
    render();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('btnArea').style.display = 'none';

  const ra = document.getElementById('resultArea');
  ra.style.display = 'block';
  ra.classList.add('fade-in');

  const a = answers; // [사업자여부, 업력, 직원수, 자금목적]
  let funds = [];
  let caution = '';
  let title = '';
  let sub = '';
  let icon = '📋';

  // 예비창업자
  if (a[0] === 'pre') {
    icon = '🌱';
    title = '창업 준비 단계에서 받을 수 있는 자금이 있어요';
    sub = '사업자 등록 전후로 신청 가능한 자금이 따로 있어요';
    funds = [
      { badge:'best', label:'창진원 예비창업패키지', desc:'최대 1억원 / 사업자 없어도 신청 가능 / 청년·여성 우대' },
      { badge:'good', label:'소진공 창업초기 특별자금', desc:'창업 1년 미만 / 최대 7,000만원' },
      { badge:'check', label:'지역 신용보증재단', desc:'소액 창업자금 / 빠른 심사' },
    ];
    caution = '💡 창업자금은 준비한 사업계획서 완성도가 승인 여부를 크게 좌우해요. 막연한 계획보다 구체적인 숫자와 근거가 중요해요.';
  }
  // 휴업
  else if (a[0] === 'pause') {
    icon = '⚠️';
    title = '휴업 상태에서는 신청이 제한될 수 있어요';
    sub = '대부분의 정책자금은 실제 영업 중인 사업자를 대상으로 해요';
    funds = [
      { badge:'check', label:'소상공인 재기지원 프로그램', desc:'재창업 준비 중인 분들을 위한 별도 트랙 존재' },
      { badge:'check', label:'신용보증재단 재기 보증', desc:'재창업 초기 보증 지원' },
    ];
    caution = '⚠️ 영업을 재개한 후 신청하는 것이 훨씬 유리해요. 재개업 후 상담을 추천드려요.';
  }
  // 일반 사업자
  else {
    const isNew = a[1] === 'under6' || a[1] === '6to2';
    const isOp = a[3] === 'operation';
    const isFacility = a[3] === 'facility';
    const isStartup = a[3] === 'startup';
    const isExpand = a[3] === 'expand';

    icon = '✅';
    title = '신청 가능한 정책자금이 있어요!';
    sub = '현재 상황에 맞는 자금을 우선순위별로 정리했어요';

    if (isOp) {
      funds = [
        { badge:'best', label:'소진공 일반경영안정자금', desc:'최대 7,000만원 / 운전자금 전용 / 접근성 가장 높음', primary: true },
        { badge:'good', label:'지역 신용보증재단', desc:'소액 빠른 심사 / 소진공 신청 전 활용 가능' },
        { badge:'check', label:'중진공 운전자금', desc:'소진공 한도 부족 시 추가 검토' },
      ];
      caution = '💡 운전자금은 소진공에서 먼저 신청하는 게 일반적으로 유리해요. 세금 체납과 연체 이력을 미리 확인해 두세요.';
    } else if (isFacility) {
      funds = [
        { badge:'best', label:'중진공 시설자금', desc:'최대 1억원 이상 / 인테리어·설비 투자 가능', primary: true },
        { badge:'good', label:'소진공 성장촉진자금', desc:'최대 1억원 / 시설+운전자금 병행 가능' },
        { badge:'check', label:'기술보증기금(기보)', desc:'기술·특허 보유 시 우대 조건' },
      ];
      caution = '💡 시설자금은 사업계획서 완성도가 중요해요. 투자 규모와 예상 매출 계획을 구체적으로 준비해야 유리해요.';
    } else if (isStartup) {
      funds = [
        { badge:'best', label:'소진공 신사업창업사관학교', desc:'예비·초기창업자 / 교육 + 자금 연계', primary: true },
        { badge:'good', label:'창진원 초기창업패키지', desc:'최대 1억원 / 청년·여성 우대' },
        { badge:'check', label:'소진공 창업초기 특별자금', desc:'창업 1년 미만 전용 상품' },
      ];
      caution = '💡 창업자금은 신청 시기가 중요해요. 사업자 등록 후 바로 신청 가능한 상품이 있으니 등록 직후 확인하는 게 좋아요.';
    } else {
      funds = [
        { badge:'best', label:'중진공 사업전환자금', desc:'확장·전환 목적 / 최대 1억원 이상', primary: true },
        { badge:'good', label:'소진공 성장촉진자금', desc:'성장 단계 소상공인 전용 / 최대 1억원' },
        { badge:'check', label:'신용보증기금(신보)', desc:'담보 없이 은행 대출 연계 가능' },
      ];
      caution = '💡 사업 확장 자금은 현재 매출 증가 추세나 구체적인 계획이 있을수록 심사에 유리해요.';
    }

    if (isNew) {
      caution += '\n\n📌 업력이 짧은 경우 일부 상품은 신청 제한이 있어요. 창업 초기 전용 상품을 먼저 확인해 주세요.';
    }
  }

  // 결과 렌더링
  let fundsHtml = funds.map(f => `
    <div class="fund-card ${f.primary ? 'primary' : ''}">
      <span class="fund-badge ${f.badge === 'best' ? 'best' : f.badge === 'good' ? 'good' : 'check'}">
        ${f.badge === 'best' ? '최우선' : f.badge === 'good' ? '추천' : '검토'}
      </span>
      <div class="fund-info">
        <strong>${f.label}</strong>
        <span>${f.desc}</span>
      </div>
    </div>
  `).join('');

  ra.innerHTML = `
    <div class="result-top fade-in">
      <div class="result-icon">${icon}</div>
      <div class="result-title">${title}</div>
      <div class="result-sub">${sub}</div>
    </div>
    <div class="result-funds">${fundsHtml}</div>
    <div class="caution-box">${caution.replace(/\n/g,'<br>')}</div>
    <div class="cta-box">
      <strong>✅ 정확한 한도와 조건은 전문가 확인이 필요해요</strong>
      <p>진단 결과를 바탕으로 실제 신청 가능 여부와<br>예상 한도를 무료로 확인해 드려요</p>
      <button class="btn-kakao" onclick="window.open('http://pf.kakao.com/_BwKMX/chat','_blank')">
        💬 카카오톡 무료 상담 신청
      </button>
    </div>
    <button class="btn-reset" onclick="resetQuiz()">🔄 처음부터 다시 진단하기</button>
  `;
}

function resetQuiz() {
  current = 0;
  answers = [];
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('btnArea').style.display = 'flex';
  document.getElementById('resultArea').style.display = 'none';
  render();
}

// 초기 렌더
render();
</script>
